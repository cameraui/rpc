version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: daily
    ignore:
      - dependency-name: "numpy"
        versions:
          - ">=2.0.0"
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily